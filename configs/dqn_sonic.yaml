experiment:
  name: sonic-dqn-smoke
  seed: 42

env:
  game: SonicTheHedgehog-Genesis-v0
  state: GreenHillZone.Act1
  obs_width: 84
  obs_height: 84
  grayscale: true
  frame_stack: 4

training:
  total_timesteps: 10000
  batch_size: 32
  replay_buffer_size: 10000
  learning_rate: 0.0001
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 8000
  target_update_freq: 1000
  train_freq: 4
  learning_starts: 1000

logging:
  log_freq: 500        # print human-readable summary every N steps
  checkpoint_freq: 5000
  checkpoint_dir: runs/checkpoints
  tensorboard_dir: runs/tensorboard

evaluation:
  n_episodes: 5